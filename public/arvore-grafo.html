<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árvore da Família Wingert</title>
  <style>
    :root{font-family:Inter,system-ui,sans-serif;color:#183028;background:#f4f1e8}*{box-sizing:border-box}body{margin:0;min-width:320px}header{display:flex;justify-content:space-between;align-items:center;gap:20px;padding:24px clamp(20px,5vw,64px);background:#173b2c;color:#fff}.marca{color:#aebc70;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem}h1{margin:4px 0 0;font-size:clamp(1.6rem,4vw,2.2rem)}.acoes{display:flex;gap:10px;flex-wrap:wrap}a,button{border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:11px 16px;background:transparent;color:#fff;font:inherit;font-weight:800;text-decoration:none;cursor:pointer}.toolbar{width:min(1500px,calc(100% - 32px));margin:22px auto 0;display:flex;flex-wrap:wrap;align-items:end;gap:12px}label{display:grid;gap:6px;font-weight:700}select{min-width:280px;border:1px solid #cfc9bd;border-radius:10px;padding:10px 12px;background:#fff;font:inherit}.status{color:#63716b;margin-left:auto}.legenda{width:min(1500px,calc(100% - 32px));margin:10px auto 0;color:#63716b;font-size:.92rem}#viewport{width:100%;overflow:auto;padding:24px 16px 60px}#canvas{position:relative;min-width:max-content;width:max-content;margin:0 auto;padding:20px 50px 50px}#linhas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:0}.geracao{position:relative;z-index:1;display:flex;justify-content:center;align-items:flex-start;gap:72px;margin-bottom:110px}.geracao:last-child{margin-bottom:0}.nucleo{display:flex;align-items:center;justify-content:center;gap:10px;min-width:220px}.pessoa{width:220px;min-height:112px;border:2px solid #64806f;border-radius:15px;background:#fff;padding:14px;display:grid;align-content:center;gap:5px;text-align:center;box-shadow:0 10px 24px rgba(31,56,43,.10)}.pessoa.parceiro{border-color:#9a8156}.pessoa strong{overflow-wrap:anywhere}.pessoa span{color:#66736e;font-size:.86rem}.uniao{color:#a84c4c;font-size:1.15rem;font-weight:900}.aviso{background:#fff6df;border:1px solid #dbc889;border-radius:12px;padding:16px;max-width:760px;margin:30px auto}@media(max-width:700px){header{align-items:flex-start;flex-direction:column}.status{width:100%;margin-left:0}.pessoa{width:180px}.geracao{gap:38px}}@media print{header,.toolbar,.legenda{display:none}body{background:#fff}#viewport{overflow:visible;padding:0}.pessoa{box-shadow:none}}
  </style>
</head>
<body>
<header><div><span class="marca">Família Wingert</span><h1>Visualização da árvore</h1></div><div class="acoes"><a href="/">Voltar ao cadastro</a><button id="sair" type="button">Sair</button></div></header>
<section class="toolbar"><label>Pessoa ou núcleo inicial<select id="foco"><option value="">Árvore completa</option></select></label><button id="imprimir" type="button" style="background:#214c3b;border-color:#214c3b">Imprimir / salvar PDF</button><span class="status" id="status">Carregando…</span></section>
<p class="legenda">Cada linha representa uma geração. Os dois núcleos de pais podem apontar para o mesmo casal.</p>
<main id="viewport"><div id="canvas"><svg id="linhas" aria-hidden="true"></svg><div id="geracoes"></div></div></main>
<script src="/__/firebase/11.10.0/firebase-app-compat.js"></script>
<script src="/__/firebase/11.10.0/firebase-auth-compat.js"></script>
<script src="/__/firebase/11.10.0/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script>
const auth=firebase.auth(),db=firebase.firestore(),canvas=document.querySelector('#canvas'),geracoesEl=document.querySelector('#geracoes'),svg=document.querySelector('#linhas'),statusEl=document.querySelector('#status'),foco=document.querySelector('#foco');let pessoas=[];const nome=p=>p?`${p.nome} ${p.sobrenome}`:'Não informado',dataBR=d=>d?d.split('-').reverse().join('/'):'',porId=id=>pessoas.find(p=>p.id===id),casalKey=(a,b)=>[a,b].filter(Boolean).sort().join('|');
function criarNucleos(){const usados=new Set(),nucleos=[],pessoaParaNucleo=new Map();for(const pessoa of pessoas){if(usados.has(pessoa.id))continue;const conjuge=pessoa.conjugeId?porId(pessoa.conjugeId):null,parceiros=[pessoa];usados.add(pessoa.id);if(conjuge&&!usados.has(conjuge.id)){parceiros.push(conjuge);usados.add(conjuge.id)}const id=casalKey(...parceiros.map(p=>p.id))||pessoa.id,n={id,parceiros,pais:new Set(),filhos:new Set(),geracao:0};nucleos.push(n);parceiros.forEach(p=>pessoaParaNucleo.set(p.id,n))}for(const n of nucleos)for(const pessoa of n.parceiros)for(const parentId of [pessoa.paiId,pessoa.maeId].filter(Boolean)){const pai=pessoaParaNucleo.get(parentId);if(pai&&pai.id!==n.id){n.pais.add(pai.id);pai.filhos.add(n.id)}}return{nucleos,pessoaParaNucleo}}
function filtrarComponente(base){if(!foco.value)return base.nucleos;const inicial=base.pessoaParaNucleo.get(foco.value);if(!inicial)return[];const mapa=new Map(base.nucleos.map(n=>[n.id,n])),visitados=new Set(),fila=[inicial.id];while(fila.length){const id=fila.shift();if(visitados.has(id))continue;visitados.add(id);const n=mapa.get(id);if(n)[...n.pais,...n.filhos].forEach(v=>{if(!visitados.has(v))fila.push(v)})}return base.nucleos.filter(n=>visitados.has(n.id))}
function calcularGeracoes(nucleos){const mapa=new Map(nucleos.map(n=>[n.id,n]));nucleos.forEach(n=>n.geracao=0);for(let i=0;i<nucleos.length+2;i++){let mudou=false;for(const n of nucleos){const pais=[...n.pais].map(id=>mapa.get(id)).filter(Boolean),nova=pais.length?Math.max(...pais.map(p=>p.geracao))+1:0;if(nova!==n.geracao){n.geracao=nova;mudou=true}}if(!mudou)break}return mapa}
function cartao(p,parceiro=false){const a=document.createElement('article');a.className=`pessoa${parceiro?' parceiro':''}`;a.innerHTML=`<strong>${nome(p)}</strong>${p.nascimento?`<span>Nasc. ${dataBR(p.nascimento)}</span>`:''}${p.cidadeNatal?`<span>Natural de ${p.cidadeNatal}</span>`:''}${(p.cidadeAtual||p.cidade)?`<span>Atual: ${p.cidadeAtual||p.cidade}</span>`:''}`;return a}
function ordenar(lista,posicoes){return[...lista].sort((a,b)=>{const media=n=>{const v=[...n.pais].map(id=>posicoes.get(id)).filter(x=>x!==undefined);return v.length?v.reduce((s,x)=>s+x,0)/v.length:999999};const d=media(a)-media(b);return d||nome(a.parceiros[0]).localeCompare(nome(b.parceiros[0]))})}
function desenharLinhas(nucleos){svg.innerHTML='';const cr=canvas.getBoundingClientRect(),els=new Map([...document.querySelectorAll('.nucleo')].map(el=>[el.dataset.id,el]));for(const filho of nucleos){const fe=els.get(filho.id);if(!fe)continue;const fr=fe.getBoundingClientRect();for(const paiId of filho.pais){const pe=els.get(paiId);if(!pe)continue;const pr=pe.getBoundingClientRect(),x1=pr.left+pr.width/2-cr.left,y1=pr.bottom-cr.top,x2=fr.left+fr.width/2-cr.left,y2=fr.top-cr.top,m=(y1+y2)/2,path=document.createElementNS('http://www.w3.org/2000/svg','path');path.setAttribute('d',`M ${x1} ${y1} C ${x1} ${m}, ${x2} ${m}, ${x2} ${y2}`);path.setAttribute('fill','none');path.setAttribute('stroke','#789084');path.setAttribute('stroke-width','2');path.setAttribute('stroke-linecap','round');svg.append(path)}}}
function renderizar(){geracoesEl.innerHTML='';svg.innerHTML='';const visiveis=filtrarComponente(criarNucleos());calcularGeracoes(visiveis);const max=visiveis.length?Math.max(...visiveis.map(n=>n.geracao)):0,posicoes=new Map();for(let g=0;g<=max;g++){const linha=document.createElement('section');linha.className='geracao';ordenar(visiveis.filter(n=>n.geracao===g),posicoes).forEach((n,i)=>{posicoes.set(n.id,i);const u=document.createElement('div');u.className='nucleo';u.dataset.id=n.id;n.parceiros.forEach((p,j)=>{if(j){const c=document.createElement('span');c.className='uniao';c.textContent='♥';u.append(c)}u.append(cartao(p,j>0))});linha.append(u)});if(linha.children.length)geracoesEl.append(linha)}if(!geracoesEl.children.length)geracoesEl.innerHTML='<div class="aviso">Ainda não há vínculos suficientes para desenhar a árvore.</div>';statusEl.textContent=`${pessoas.length} pessoa(s) cadastrada(s)`;requestAnimationFrame(()=>desenharLinhas(visiveis))}
auth.onAuthStateChanged(async usuario=>{if(!usuario){location.href='/';return}try{const r=await db.collection('pessoas').orderBy('nome').get();pessoas=r.docs.map(d=>({id:d.id,...d.data()}));pessoas.forEach(p=>{const o=document.createElement('option');o.value=p.id;o.textContent=nome(p);foco.append(o)});renderizar()}catch(e){statusEl.textContent='Erro ao carregar a árvore.'}});foco.addEventListener('change',renderizar);window.addEventListener('resize',renderizar);document.querySelector('#sair').addEventListener('click',async()=>{await auth.signOut();location.href='/'});document.querySelector('#imprimir').addEventListener('click',()=>window.print());
</script>
</body>
</html>
