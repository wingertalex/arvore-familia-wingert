<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árvore da Família Wingert</title>
  <style>
    :root { font-family: Inter, system-ui, sans-serif; color: #183028; background: #f4f1e8; }
    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:20px; padding:24px clamp(20px,5vw,64px); background:#173b2c; color:#fff; }
    .marca { color:#aebc70; font-weight:800; letter-spacing:.08em; text-transform:uppercase; font-size:.78rem; }
    h1 { margin:4px 0 0; font-size:clamp(1.6rem,4vw,2.2rem); }
    .acoes { display:flex; gap:10px; }
    a, button { border:1px solid rgba(255,255,255,.5); border-radius:10px; padding:11px 16px; background:transparent; color:#fff; font:inherit; font-weight:800; text-decoration:none; cursor:pointer; }
    .toolbar { width:min(1400px,calc(100% - 32px)); margin:22px auto 0; display:flex; flex-wrap:wrap; align-items:end; gap:12px; }
    label { display:grid; gap:6px; font-weight:700; }
    select { min-width:280px; border:1px solid #cfc9bd; border-radius:10px; padding:10px 12px; background:#fff; font:inherit; }
    .status { color:#63716b; margin-left:auto; }
    #arvore { width:min(1600px,calc(100% - 24px)); margin:26px auto 60px; overflow:auto; padding:12px; }
    .floresta { display:flex; align-items:flex-start; justify-content:center; gap:60px; min-width:max-content; }
    .ramo { display:flex; flex-direction:column; align-items:center; position:relative; padding-top:4px; }
    .unidade { display:flex; align-items:center; justify-content:center; gap:10px; position:relative; z-index:2; }
    .pessoa { width:220px; min-height:105px; border:2px solid #64806f; border-radius:15px; background:#fff; padding:14px; display:grid; align-content:center; gap:5px; text-align:center; box-shadow:0 10px 24px rgba(31,56,43,.10); }
    .pessoa.conjuge { border-color:#9a8156; }
    .pessoa strong { overflow-wrap:anywhere; }
    .pessoa span { color:#66736e; font-size:.86rem; }
    .uniao { color:#a84c4c; font-size:1.15rem; font-weight:900; }
    .filhos { display:flex; align-items:flex-start; justify-content:center; gap:34px; position:relative; padding-top:58px; }
    .filhos::before { content:""; position:absolute; top:22px; left:50%; width:2px; height:36px; background:#8da095; }
    .filhos > .ramo::before { content:""; position:absolute; top:-36px; left:50%; width:2px; height:36px; background:#8da095; }
    .filhos.com-varios::after { content:""; position:absolute; top:22px; left:calc(var(--inicio) + 110px); right:calc(var(--fim) + 110px); height:2px; background:#8da095; }
    .aviso { background:#fff6df; border:1px solid #dbc889; border-radius:12px; padding:16px; max-width:720px; margin:30px auto; }
    @media (max-width:700px) { header { align-items:flex-start; flex-direction:column; } .status { width:100%; margin-left:0; } .pessoa { width:180px; } }
    @media print { header,.toolbar { display:none; } body { background:#fff; } #arvore { overflow:visible; width:100%; } .pessoa { box-shadow:none; } }
  </style>
</head>
<body>
  <header>
    <div><span class="marca">Família Wingert</span><h1>Visualização da árvore</h1></div>
    <div class="acoes"><a href="/">Voltar ao cadastro</a><button id="sair" type="button">Sair</button></div>
  </header>
  <section class="toolbar">
    <label>Pessoa ou núcleo inicial<select id="foco"><option value="">Árvore completa</option></select></label>
    <button id="imprimir" type="button" style="background:#214c3b;border-color:#214c3b">Imprimir / salvar PDF</button>
    <span class="status" id="status">Carregando…</span>
  </section>
  <main id="arvore"></main>

  <script type="module">
    import {initializeApp} from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js'
    import {getAuth, onAuthStateChanged, signOut} from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-auth.js'
    import {collection, getDocs, getFirestore, orderBy, query} from 'https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js'

    const app = initializeApp({
      apiKey: 'AIzaSyD3qxs2zhBIwVXERlaTNNIuCm2aUh7gjrk',
      authDomain: 'arvore-familia-wingert.firebaseapp.com',
      projectId: 'arvore-familia-wingert',
      storageBucket: 'arvore-familia-wingert.firebasestorage.app',
      messagingSenderId: '972094437748',
      appId: '1:972094437748:web:8ca2839acfe49ae2555421'
    })
    const auth = getAuth(app)
    const db = getFirestore(app)
    const arvore = document.querySelector('#arvore')
    const status = document.querySelector('#status')
    const foco = document.querySelector('#foco')
    let pessoas = []

    const nome = pessoa => pessoa ? `${pessoa.nome} ${pessoa.sobrenome}` : 'Não informado'
    const dataBR = data => data ? data.split('-').reverse().join('/') : ''
    const porId = id => pessoas.find(p => p.id === id)
    const chaveCasal = (a, b) => [a || '', b || ''].filter(Boolean).sort().join('|')

    function cartao(pessoa, conjuge = false) {
      const artigo = document.createElement('article')
      artigo.className = `pessoa${conjuge ? ' conjuge' : ''}`
      artigo.innerHTML = `<strong>${nome(pessoa)}</strong>${pessoa.nascimento ? `<span>Nasc. ${dataBR(pessoa.nascimento)}</span>` : ''}${pessoa.cidadeNatal ? `<span>Natural de ${pessoa.cidadeNatal}</span>` : ''}${(pessoa.cidadeAtual || pessoa.cidade) ? `<span>Atual: ${pessoa.cidadeAtual || pessoa.cidade}</span>` : ''}`
      return artigo
    }

    function construirUnioes() {
      const mapa = new Map()
      for (const pessoa of pessoas) {
        if (pessoa.paiId || pessoa.maeId) {
          const chave = chaveCasal(pessoa.paiId, pessoa.maeId)
          if (!mapa.has(chave)) mapa.set(chave, {id: chave, parceiros: [pessoa.paiId, pessoa.maeId].filter(Boolean), filhos: []})
          mapa.get(chave).filhos.push(pessoa.id)
        }
      }
      for (const pessoa of pessoas) {
        if (pessoa.conjugeId) {
          const chave = chaveCasal(pessoa.id, pessoa.conjugeId)
          if (!mapa.has(chave)) mapa.set(chave, {id: chave, parceiros: [pessoa.id, pessoa.conjugeId].sort(), filhos: []})
        }
      }
      return [...mapa.values()]
    }

    function renderizar() {
      arvore.innerHTML = ''
      const unioes = construirUnioes()
      const uniaoPorPessoa = new Map()
      unioes.forEach(uniao => uniao.parceiros.forEach(id => {
        const atual = uniaoPorPessoa.get(id) || []
        atual.push(uniao)
        uniaoPorPessoa.set(id, atual)
      }))

      const alvoId = foco.value
      const rendered = new Set()

      function ramoDaUniao(uniao, caminho = new Set()) {
        if (!uniao || caminho.has(uniao.id) || rendered.has(uniao.id)) return null
        rendered.add(uniao.id)
        const novoCaminho = new Set(caminho).add(uniao.id)
        const ramo = document.createElement('section')
        ramo.className = 'ramo'
        const unidade = document.createElement('div')
        unidade.className = 'unidade'
        uniao.parceiros.forEach((id, indice) => {
          if (indice) { const coracao = document.createElement('span'); coracao.className='uniao'; coracao.textContent='♥'; unidade.append(coracao) }
          const pessoa = porId(id)
          if (pessoa) unidade.append(cartao(pessoa, indice > 0))
        })
        ramo.append(unidade)

        const filhosElementos = []
        for (const filhoId of [...new Set(uniao.filhos)]) {
          const unioesFilho = (uniaoPorPessoa.get(filhoId) || []).filter(item => item.id !== uniao.id)
          let filhoRamo = null
          if (unioesFilho.length) filhoRamo = ramoDaUniao(unioesFilho[0], novoCaminho)
          if (!filhoRamo) {
            const filho = porId(filhoId)
            if (filho) { filhoRamo = document.createElement('section'); filhoRamo.className='ramo'; const unidadeFilho=document.createElement('div'); unidadeFilho.className='unidade'; unidadeFilho.append(cartao(filho)); filhoRamo.append(unidadeFilho) }
          }
          if (filhoRamo) filhosElementos.push(filhoRamo)
        }
        if (filhosElementos.length) {
          const filhos = document.createElement('div')
          filhos.className = `filhos${filhosElementos.length > 1 ? ' com-varios' : ''}`
          filhos.style.setProperty('--inicio','0px'); filhos.style.setProperty('--fim','0px')
          filhosElementos.forEach(el => filhos.append(el))
          ramo.append(filhos)
        }
        return ramo
      }

      let raizes = unioes.filter(uniao => uniao.parceiros.every(id => {
        const pessoa = porId(id)
        return !pessoa || (!pessoa.paiId && !pessoa.maeId)
      }))

      if (alvoId) {
        const candidatas = uniaoPorPessoa.get(alvoId) || []
        raizes = candidatas.length ? [candidatas[0]] : []
      }

      const floresta = document.createElement('div')
      floresta.className = 'floresta'
      raizes.forEach(uniao => { const ramo = ramoDaUniao(uniao); if (ramo) floresta.append(ramo) })

      for (const pessoa of pessoas) {
        if ([...rendered].some(chave => chave.split('|').includes(pessoa.id))) continue
        const unidade = document.createElement('section'); unidade.className='ramo'; const linha=document.createElement('div'); linha.className='unidade'; linha.append(cartao(pessoa)); unidade.append(linha); floresta.append(unidade)
      }

      if (!floresta.children.length) arvore.innerHTML = '<div class="aviso">Ainda não há vínculos suficientes para desenhar a árvore.</div>'
      else arvore.append(floresta)
      status.textContent = `${pessoas.length} pessoa(s) cadastrada(s)`
    }

    onAuthStateChanged(auth, async usuario => {
      if (!usuario) { location.href = '/'; return }
      try {
        const resultado = await getDocs(query(collection(db,'pessoas'), orderBy('nome')))
        pessoas = resultado.docs.map(doc => ({id:doc.id, ...doc.data()}))
        pessoas.forEach(p => { const opcao=document.createElement('option'); opcao.value=p.id; opcao.textContent=nome(p); foco.append(opcao) })
        renderizar()
      } catch { status.textContent='Erro ao carregar a árvore.' }
    })
    foco.addEventListener('change', renderizar)
    document.querySelector('#sair').addEventListener('click', async () => { await signOut(auth); location.href='/' })
    document.querySelector('#imprimir').addEventListener('click', () => window.print())
  </script>
</body>
</html>
