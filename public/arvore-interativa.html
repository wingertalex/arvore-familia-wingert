<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Explorador da Família Wingert</title>
  <style>
    :root{font-family:Inter,system-ui,sans-serif;color:#183028;background:#f5f3ec}*{box-sizing:border-box}body{margin:0;min-width:320px}button,select{font:inherit}header{display:flex;justify-content:space-between;gap:18px;align-items:center;padding:20px clamp(16px,4vw,54px);background:#173b2c;color:#fff}.marca{color:#b9c979;font-weight:900;letter-spacing:.08em;text-transform:uppercase;font-size:.76rem}h1{margin:4px 0 0;font-size:clamp(1.4rem,3vw,2rem)}.header-actions{display:flex;gap:8px;flex-wrap:wrap}a,button{border:0;border-radius:10px;padding:10px 14px;font-weight:800;text-decoration:none;cursor:pointer}.header-actions a,.header-actions button{color:#fff;background:transparent;border:1px solid #ffffff66}.toolbar{display:grid;grid-template-columns:minmax(220px,1.5fr) repeat(2,minmax(150px,.8fr)) auto;gap:12px;align-items:end;padding:16px clamp(16px,4vw,54px);background:#fff;border-bottom:1px solid #dedbd2}.toolbar label{display:grid;gap:5px;font-size:.85rem;font-weight:800}.toolbar select{width:100%;padding:10px;border:1px solid #cbc8bf;border-radius:10px;background:#fff}.tools{display:flex;gap:7px;flex-wrap:wrap}.tools button{background:#214c3b;color:#fff;min-width:42px}.legend{display:flex;gap:16px;flex-wrap:wrap;padding:10px clamp(16px,4vw,54px);font-size:.84rem;color:#607069;background:#faf9f5;border-bottom:1px solid #e5e2da}.legend i{display:inline-block;width:20px;height:3px;margin-right:5px;vertical-align:middle;border-radius:3px}.workspace{position:relative;height:calc(100vh - 190px);min-height:560px;overflow:hidden;background-image:linear-gradient(#dfe3dd55 1px,transparent 1px),linear-gradient(90deg,#dfe3dd55 1px,transparent 1px);background-size:24px 24px}.viewport{position:absolute;inset:0;cursor:grab;overflow:hidden}.viewport.dragging{cursor:grabbing}.stage{position:absolute;transform-origin:0 0;width:2400px;height:1600px}.generation-band{position:absolute;left:0;width:100%;height:210px;border-top:1px dashed #b9c2bc;background:#ffffff32}.generation-title{position:absolute;left:18px;top:10px;font-size:.76rem;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:#7b8982}.node{position:absolute;width:220px;min-height:112px;background:#fff;border:3px solid var(--branch,#6b8275);border-radius:16px;padding:13px;text-align:center;display:grid;align-content:center;gap:4px;box-shadow:0 10px 25px #18302816;z-index:3;cursor:pointer}.node:hover,.node.selected{box-shadow:0 0 0 4px color-mix(in srgb,var(--branch) 22%,transparent),0 12px 28px #18302822}.node strong{overflow-wrap:anywhere}.node span{font-size:.82rem;color:#66746e}.node .relation{font-size:.72rem;font-weight:900;text-transform:uppercase;color:var(--branch)}svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:1}.edge{fill:none;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}.marriage{stroke-dasharray:7 5;stroke-width:2}.side-panel{position:absolute;right:16px;top:16px;width:min(330px,calc(100% - 32px));background:#fffffff5;border:1px solid #d8d5cc;border-radius:16px;padding:18px;box-shadow:0 16px 40px #18302820;z-index:8;display:none}.side-panel.open{display:block}.side-panel h2{margin:0 0 6px}.side-panel p{margin:5px 0;color:#63716b}.side-panel .links{display:grid;gap:7px;margin-top:14px}.side-panel button{background:#214c3b;color:#fff}.empty{padding:40px;text-align:center;color:#66746e}@media(max-width:850px){.toolbar{grid-template-columns:1fr 1fr}.toolbar label:first-child{grid-column:1/-1}.workspace{height:calc(100vh - 260px)}header{align-items:flex-start;flex-direction:column}}@media(max-width:520px){.toolbar{grid-template-columns:1fr}.toolbar label:first-child{grid-column:auto}.workspace{height:calc(100vh - 340px)}.legend{display:none}}@media print{header,.toolbar,.legend,.side-panel{display:none!important}.workspace{height:auto;overflow:visible;background:none}.viewport{position:relative;overflow:visible}.stage{transform:none!important;position:relative}.node{box-shadow:none}}
  </style>
</head>
<body>
<header><div><span class="marca">Família Wingert</span><h1>Explorador genealógico</h1></div><div class="header-actions"><a href="/">Cadastro</a><a href="/estatisticas.html">Estatísticas</a><button id="print">Salvar PDF</button><button id="logout">Sair</button></div></header>
<section class="toolbar">
<label>Pessoa central<select id="center"><option value="">Selecione uma pessoa</option></select></label>
<label>Visualização<select id="mode"><option value="direct">Família direta</option><option value="ancestors">Ancestrais</option><option value="descendants">Descendentes</option><option value="complete">Árvore completa</option></select></label>
<label>Gerações<select id="depth"><option value="2">2 gerações</option><option value="3" selected>3 gerações</option><option value="4">4 gerações</option><option value="99">Todas</option></select></label>
<div class="tools"><button id="zoomOut">−</button><button id="fit">Ajustar</button><button id="zoomIn">+</button></div>
</section>
<div class="legend"><span><i style="background:#3f6f8f"></i>Linha paterna</span><span><i style="background:#9a5b73"></i>Linha materna</span><span><i style="background:#6f7f43"></i>Descendentes</span><span><i style="background:#92713f"></i>Família do cônjuge</span></div>
<main class="workspace"><div class="viewport" id="viewport"><div class="stage" id="stage"><svg id="edges"></svg><div id="bands"></div><div id="nodes"></div></div></div><aside class="side-panel" id="panel"></aside></main>
<script src="/__/firebase/11.10.0/firebase-app-compat.js"></script><script src="/__/firebase/11.10.0/firebase-auth-compat.js"></script><script src="/__/firebase/11.10.0/firebase-firestore-compat.js"></script><script src="/__/firebase/init.js"></script><script src="/arvore-interativa.js"></script>
</body></html>
