<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árvore da Família Wingert</title>
  <style>
    :root { font-family: Inter, system-ui, sans-serif; color:#183028; background:#f4f1e8; }
    * { box-sizing:border-box; }
    body { margin:0; min-width:320px; }
    header { display:flex; justify-content:space-between; align-items:center; gap:20px; padding:24px clamp(20px,5vw,64px); background:#173b2c; color:#fff; }
    .marca { color:#aebc70; font-weight:800; letter-spacing:.08em; text-transform:uppercase; font-size:.78rem; }
    h1 { margin:4px 0 0; font-size:clamp(1.6rem,4vw,2.2rem); }
    .acoes { display:flex; gap:10px; flex-wrap:wrap; }
    a, button { border:1px solid rgba(255,255,255,.5); border-radius:10px; padding:11px 16px; background:transparent; color:#fff; font:inherit; font-weight:800; text-decoration:none; cursor:pointer; }
    .toolbar { width:min(1500px,calc(100% - 32px)); margin:22px auto 0; display:flex; flex-wrap:wrap; align-items:end; gap:12px; }
    label { display:grid; gap:6px; font-weight:700; }
    select { min-width:280px; border:1px solid #cfc9bd; border-radius:10px; padding:10px 12px; background:#fff; font:inherit; }
    .status { color:#63716b; margin-left:auto; }
    .legenda { width:min(1500px,calc(100% - 32px)); margin:10px auto 0; color:#63716b; font-size:.92rem; }
    #viewport { width:100%; overflow:auto; padding:28px 18px 70px; }
    #canvas { position:relative; min-width:max-content; width:max-content; margin:0 auto; padding:20px 60px 50px; }
    #linhas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; z-index:0; }
    .geracao { position:relative; z-index:1; display:flex; justify-content:center; align-items:flex-start; gap:90px; margin-bottom:125px; }
    .geracao:last-child { margin-bottom:0; }
    .nucleo { min-width:270px; max-width:520px; border:2px solid #6b8275; border-radius:18px; background:#fff; box-shadow:0 12px 28px rgba(31,56,43,.11); overflow:hidden; }
    .nucleo-titulo { padding:7px 12px; background:#eef1e8; color:#56685f; font-size:.76rem; font-weight:800; text-transform:uppercase; letter-spacing:.06em; text-align:center; border-bottom:1px solid #d7ddd7; }
    .membros { display:flex; align-items:stretch; }
    .membro { width:230px; min-height:118px; padding:15px; display:grid; align-content:center; gap:5px; text-align:center; }
    .membro + .membro { border-left:1px solid #d8d3c8; }
    .membro strong { overflow-wrap:anywhere; }
    .membro span { color:#66736e; font-size:.86rem; }
    .solteiro .membro { width:270px; }
    .aviso { background:#fff6df; border:1px solid #dbc889; border-radius:12px; padding:16px; max-width:760px; margin:30px auto; }
    @media(max-width:700px){ header{align-items:flex-start;flex-direction:column}.status{width:100%;margin-left:0}.geracao{gap:44px}.membro{width:190px}.solteiro .membro{width:220px} }
    @media print { header,.toolbar,.legenda{display:none} body{background:#fff} #viewport{overflow:visible;padding:0}.nucleo{box-shadow:none} }
  </style>
</head>
<body>
<header>
  <div><span class="marca">Família Wingert</span><h1>Visualização da árvore</h1></div>
  <div class="acoes"><a href="/">Voltar ao cadastro</a><button id="sair" type="button">Sair</button></div>
</header>
<section class="toolbar">
  <label>Pessoa ou núcleo inicial<select id="foco"><option value="">Árvore completa</option></select></label>
  <button id="imprimir" type="button" style="background:#214c3b;border-color:#214c3b">Imprimir / salvar PDF</button>
  <span class="status" id="status">Carregando…</span>
</section>
<p class="legenda">Cada bloco representa uma pessoa ou casal. As linhas descem dos pais para o núcleo familiar dos filhos.</p>
<main id="viewport"><div id="canvas"><svg id="linhas" aria-hidden="true"></svg><div id="geracoes"></div></div></main>
<script src="/__/firebase/11.10.0/firebase-app-compat.js"></script>
<script src="/__/firebase/11.10.0/firebase-auth-compat.js"></script>
<script src="/__/firebase/11.10.0/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script>
const auth=firebase.auth();
const db=firebase.firestore();
const canvas=document.querySelector('#canvas');
const geracoesEl=document.querySelector('#geracoes');
const svg=document.querySelector('#linhas');
const statusEl=document.querySelector('#status');
const foco=document.querySelector('#foco');
let pessoas=[];

const nome=p=>p?`${p.nome} ${p.sobrenome}`:'Não informado';
const dataBR=d=>d?d.split('-').reverse().join('/'):'';
const porId=id=>pessoas.find(p=>p.id===id);
const chavePar=(a,b)=>[a,b].filter(Boolean).sort().join('|');

function paresConjugais(){
  const pares=new Set();
  for(const p of pessoas){
    if(p.conjugeId && porId(p.conjugeId)) pares.add(chavePar(p.id,p.conjugeId));
  }
  return pares;
}

function criarNucleos(){
  const pares=paresConjugais();
  const pessoaParaNucleo=new Map();
  const nucleos=[];
  const usados=new Set();

  for(const chave of pares){
    const ids=chave.split('|');
    const parceiros=ids.map(porId).filter(Boolean);
    if(!parceiros.length) continue;
    const nucleo={id:chave, parceiros, pais:new Set(), filhos:new Set(), geracao:0};
    nucleos.push(nucleo);
    parceiros.forEach(p=>{ usados.add(p.id); pessoaParaNucleo.set(p.id,nucleo); });
  }

  for(const p of pessoas){
    if(usados.has(p.id)) continue;
    const nucleo={id:p.id, parceiros:[p], pais:new Set(), filhos:new Set(), geracao:0};
    nucleos.push(nucleo);
    pessoaParaNucleo.set(p.id,nucleo);
  }

  for(const nucleo of nucleos){
    for(const pessoa of nucleo.parceiros){
      for(const parentId of [pessoa.paiId,pessoa.maeId].filter(Boolean)){
        const paiNucleo=pessoaParaNucleo.get(parentId);
        if(paiNucleo && paiNucleo.id!==nucleo.id){
          nucleo.pais.add(paiNucleo.id);
          paiNucleo.filhos.add(nucleo.id);
        }
      }
    }
  }

  return {nucleos,pessoaParaNucleo};
}

function filtrarComponente(base){
  if(!foco.value) return base.nucleos;
  const inicial=base.pessoaParaNucleo.get(foco.value);
  if(!inicial) return [];
  const mapa=new Map(base.nucleos.map(n=>[n.id,n]));
  const visitados=new Set();
  const fila=[inicial.id];
  while(fila.length){
    const id=fila.shift();
    if(visitados.has(id)) continue;
    visitados.add(id);
    const n=mapa.get(id);
    if(n) [...n.pais,...n.filhos].forEach(v=>{ if(!visitados.has(v)) fila.push(v); });
  }
  return base.nucleos.filter(n=>visitados.has(n.id));
}

function calcularGeracoes(nucleos){
  const mapa=new Map(nucleos.map(n=>[n.id,n]));
  nucleos.forEach(n=>n.geracao=0);
  for(let i=0;i<nucleos.length+3;i++){
    let mudou=false;
    for(const n of nucleos){
      const pais=[...n.pais].map(id=>mapa.get(id)).filter(Boolean);
      const nova=pais.length?Math.max(...pais.map(p=>p.geracao))+1:0;
      if(nova!==n.geracao){ n.geracao=nova; mudou=true; }
    }
    if(!mudou) break;
  }
}

function membro(p){
  const div=document.createElement('div');
  div.className='membro';
  div.innerHTML=`<strong>${nome(p)}</strong>${p.nascimento?`<span>Nasc. ${dataBR(p.nascimento)}</span>`:''}${p.cidadeNatal?`<span>Natural de ${p.cidadeNatal}</span>`:''}${(p.cidadeAtual||p.cidade)?`<span>Atual: ${p.cidadeAtual||p.cidade}</span>`:''}`;
  return div;
}

function cartaoNucleo(n){
  const artigo=document.createElement('article');
  artigo.className=`nucleo${n.parceiros.length===1?' solteiro':''}`;
  artigo.dataset.id=n.id;
  const titulo=document.createElement('div');
  titulo.className='nucleo-titulo';
  titulo.textContent=n.parceiros.length>1?'Casal':'Pessoa';
  const membros=document.createElement('div');
  membros.className='membros';
  n.parceiros.forEach(p=>membros.append(membro(p)));
  artigo.append(titulo,membros);
  return artigo;
}

function ordenarGeracao(lista,posicoes){
  return [...lista].sort((a,b)=>{
    const media=n=>{
      const valores=[...n.pais].map(id=>posicoes.get(id)).filter(v=>v!==undefined);
      return valores.length?valores.reduce((s,v)=>s+v,0)/valores.length:Number.MAX_SAFE_INTEGER;
    };
    const diferenca=media(a)-media(b);
    return diferenca || nome(a.parceiros[0]).localeCompare(nome(b.parceiros[0]));
  });
}

function desenharLinhas(nucleos){
  svg.innerHTML='';
  const canvasRect=canvas.getBoundingClientRect();
  const elementos=new Map([...document.querySelectorAll('.nucleo')].map(el=>[el.dataset.id,el]));
  for(const filho of nucleos){
    const filhoEl=elementos.get(filho.id);
    if(!filhoEl) continue;
    const filhoRect=filhoEl.getBoundingClientRect();
    const destinoX=filhoRect.left+filhoRect.width/2-canvasRect.left;
    const destinoY=filhoRect.top-canvasRect.top;
    for(const paiId of filho.pais){
      const paiEl=elementos.get(paiId);
      if(!paiEl) continue;
      const paiRect=paiEl.getBoundingClientRect();
      const origemX=paiRect.left+paiRect.width/2-canvasRect.left;
      const origemY=paiRect.bottom-canvasRect.top;
      const meioY=(origemY+destinoY)/2;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M ${origemX} ${origemY} V ${meioY} H ${destinoX} V ${destinoY}`);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','#789084');
      path.setAttribute('stroke-width','2');
      path.setAttribute('stroke-linejoin','round');
      path.setAttribute('stroke-linecap','round');
      svg.append(path);
    }
  }
}

function renderizar(){
  geracoesEl.innerHTML='';
  svg.innerHTML='';
  const base=criarNucleos();
  const visiveis=filtrarComponente(base);
  calcularGeracoes(visiveis);
  const max=visiveis.length?Math.max(...visiveis.map(n=>n.geracao)):0;
  const posicoes=new Map();

  for(let g=0;g<=max;g++){
    const linha=document.createElement('section');
    linha.className='geracao';
    const ordenados=ordenarGeracao(visiveis.filter(n=>n.geracao===g),posicoes);
    ordenados.forEach((n,i)=>{ posicoes.set(n.id,i); linha.append(cartaoNucleo(n)); });
    if(linha.children.length) geracoesEl.append(linha);
  }

  if(!geracoesEl.children.length) geracoesEl.innerHTML='<div class="aviso">Ainda não há vínculos suficientes para desenhar a árvore.</div>';
  statusEl.textContent=`${pessoas.length} pessoa(s) cadastrada(s)`;
  requestAnimationFrame(()=>desenharLinhas(visiveis));
}

auth.onAuthStateChanged(async usuario=>{
  if(!usuario){ location.href='/'; return; }
  try{
    const resultado=await db.collection('pessoas').orderBy('nome').get();
    pessoas=resultado.docs.map(d=>({id:d.id,...d.data()}));
    pessoas.forEach(p=>{ const opcao=document.createElement('option'); opcao.value=p.id; opcao.textContent=nome(p); foco.append(opcao); });
    renderizar();
  }catch(e){ statusEl.textContent='Erro ao carregar a árvore.'; }
});

foco.addEventListener('change',renderizar);
window.addEventListener('resize',()=>requestAnimationFrame(()=>desenharLinhas(filtrarComponente(criarNucleos()))));
document.querySelector('#sair').addEventListener('click',async()=>{ await auth.signOut(); location.href='/'; });
document.querySelector('#imprimir').addEventListener('click',()=>window.print());
</script>
</body>
</html>
