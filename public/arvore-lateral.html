<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Árvore da Família Wingert</title>
  <style>
    :root{font-family:Inter,system-ui,sans-serif;color:#183028;background:#f4f1e8}*{box-sizing:border-box}body{margin:0;min-width:320px}header{display:flex;justify-content:space-between;align-items:center;gap:20px;padding:24px clamp(20px,5vw,64px);background:#173b2c;color:#fff}.marca{color:#aebc70;font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.78rem}h1{margin:4px 0 0;font-size:clamp(1.6rem,4vw,2.2rem)}.acoes{display:flex;gap:10px;flex-wrap:wrap}a,button{border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:11px 16px;background:transparent;color:#fff;font:inherit;font-weight:800;text-decoration:none;cursor:pointer}.toolbar{width:min(1500px,calc(100% - 32px));margin:22px auto 0;display:flex;flex-wrap:wrap;align-items:end;gap:12px}label{display:grid;gap:6px;font-weight:700}select{min-width:280px;border:1px solid #cfc9bd;border-radius:10px;padding:10px 12px;background:#fff;font:inherit}.status{color:#63716b;margin-left:auto}.legenda{width:min(1500px,calc(100% - 32px));margin:10px auto 0;color:#63716b;font-size:.92rem}#viewport{width:100%;overflow:auto;padding:28px 18px 70px}#canvas{position:relative;min-width:max-content;width:max-content;margin:0 auto;padding:20px 60px 50px}#linhas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:0}.geracao{position:relative;z-index:1;display:flex;justify-content:center;align-items:flex-start;gap:90px;margin-bottom:125px}.geracao:last-child{margin-bottom:0}.nucleo{min-width:270px;max-width:520px;border:2px solid #6b8275;border-radius:18px;background:#fff;box-shadow:0 12px 28px rgba(31,56,43,.11);overflow:hidden}.nucleo-titulo{padding:7px 12px;background:#eef1e8;color:#56685f;font-size:.76rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;text-align:center;border-bottom:1px solid #d7ddd7}.membros{display:flex;align-items:stretch}.membro{position:relative;width:230px;min-height:118px;padding:15px;display:grid;align-content:center;gap:5px;text-align:center}.membro+.membro{border-left:1px solid #d8d3c8}.membro strong{overflow-wrap:anywhere}.membro span{color:#66736e;font-size:.86rem}.solteiro .membro{width:270px}.aviso{background:#fff6df;border:1px solid #dbc889;border-radius:12px;padding:16px;max-width:760px;margin:30px auto}@media(max-width:700px){header{align-items:flex-start;flex-direction:column}.status{width:100%;margin-left:0}.geracao{gap:44px}.membro{width:190px}.solteiro .membro{width:220px}}@media print{header,.toolbar,.legenda{display:none}body{background:#fff}#viewport{overflow:visible;padding:0}.nucleo{box-shadow:none}}
  </style>
</head>
<body>
<header><div><span class="marca">Família Wingert</span><h1>Visualização da árvore</h1></div><div class="acoes"><a href="/">Voltar ao cadastro</a><button id="sair" type="button">Sair</button></div></header>
<section class="toolbar"><label>Pessoa ou núcleo inicial<select id="foco"><option value="">Árvore completa</option></select></label><button id="imprimir" type="button" style="background:#214c3b;border-color:#214c3b">Imprimir / salvar PDF</button><span class="status" id="status">Carregando…</span></section>
<p class="legenda">As linhas são reorganizadas para reduzir cruzamentos. Cada cor representa um núcleo de pais. ★ nascimento · ✝ falecimento.</p>
<main id="viewport"><div id="canvas"><svg id="linhas" aria-hidden="true"></svg><div id="geracoes"></div></div></main>
<script src="/__/firebase/11.10.0/firebase-app-compat.js"></script>
<script src="/__/firebase/11.10.0/firebase-auth-compat.js"></script>
<script src="/__/firebase/11.10.0/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script src="/arvore-organizada.js"></script>
</body>
</html>
